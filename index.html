<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Katalog</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #333; font-family: sans-serif; overflow-x: hidden; }
        .controls { 
            position: fixed; top: 0; left: 0; right: 0; 
            background: rgba(0,0,0,0.8); color: white; padding: 10px; 
            display: flex; justify-content: center; gap: 10px; z-index: 10;
        }
        #pdf-container { width: 100%; margin-top: 50px; display: flex; justify-content: center; }
        canvas { display: block; max-width: 100%; height: auto !important; }
        button { cursor: pointer; padding: 5px 15px; }
    </style>
</head>
<body>

    <div class="controls">
        <button id="prev-page">Předchozí</button>
        <span id="page-info">Strana <span id="page-num">1</span> z <span id="page-count">0</span></span>
        <button id="next-page">Další</button>
    </div>

    <div id="pdf-container">
        <canvas id="pdf-render"></canvas>
    </div>

    <script>
        // --- 1. LOGIKA PRO VÍCE KATALOGŮ PŘES URL ---
        const urlParams = new URLSearchParams(window.location.search);
        
        // Získá název souboru z adresy ?file=neco (pokud není, použije 'data.pdf')
        const fileName = urlParams.get('file') || 'data'; 
        const url = `${fileName}.pdf`; 

        // --- 2. NASTAVENÍ PDF.JS ---
        let pdfDoc = null,
            pageNum = parseInt(urlParams.get('page')) || 1,
            pageIsRendering = false,
            pageNumIsPending = null;

        const canvas = document.querySelector('#pdf-render'),
              ctx = canvas.getContext('2d');

        // --- 3. FUNKCE PRO VYKRESLENÍ (AUTOMATICKÝ ZOOM) ---
        const renderPage = num => {
            pageIsRendering = true;

            pdfDoc.getPage(num).then(page => {
                // Výpočet šířky: vezme šířku okna prohlížeče
                const windowWidth = window.innerWidth;
                const unscaledViewport = page.getViewport({ scale: 1 });
                
                // Vypočítá scale tak, aby PDF zabralo 100% šířky (mínus malá rezerva)
                const scale = (windowWidth) / unscaledViewport.width;
                const viewport = page.getViewport({ scale: scale });

                canvas.height = viewport.height;
                canvas.width = viewport.width;

                const renderCtx = { canvasContext: ctx, viewport };

                page.render(renderCtx).promise.then(() => {
                    pageIsRendering = false;
                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });

                document.querySelector('#page-num').textContent = num;
                
                // Aktualizace URL bez reloadu stránky (volitelné)
                const newUrl = `?file=${fileName}&page=${num}`;
                window.history.replaceState({path:newUrl}, '', newUrl);
            });
        };

        const queueRenderPage = num => {
            if (pageIsRendering) { pageNumIsPending = num; } 
            else { renderPage(num); }
        };

        // --- 4. OVLÁDÁNÍ ---
        document.querySelector('#prev-page').addEventListener('click', () => {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        });

        document.querySelector('#next-page').addEventListener('click', () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        });

        // Překreslení při otočení mobilu nebo změně velikosti okna
        window.addEventListener('resize', () => {
            if (pdfDoc) renderPage(pageNum);
        });

        // --- 5. NABEHNUTÍ PDF ---
        pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            document.querySelector('#page-count').textContent = pdfDoc.numPages;
            renderPage(pageNum);
        }).catch(err => {
            console.error("Chyba při načítání PDF: ", err);
            alert("Soubor " + url + " nebyl nalezen. Ujistěte se, že soubor existuje.");
        });
    </script>
</body>
</html>
