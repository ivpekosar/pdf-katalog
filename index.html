<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalogy</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1814;
    --surface: #242220;
    --surface2: #2e2c29;
    --accent: #c8a96e;
    --accent2: #e8d5b0;
    --text: #f0ebe2;
    --muted: #8a8278;
    --border: rgba(200,169,110,0.2);
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
  }

  header {
    flex-shrink: 0;
    height: 52px;
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--accent);
    white-space: nowrap;
  }
  .logo span {
    color: var(--muted);
    font-size: 0.72rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-left: 0.6rem;
  }

  .toolbar {
    flex-shrink: 0;
    height: 46px;
    padding: 0 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .tb-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--accent2);
    padding: 0 0.85rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    transition: all 0.15s;
    height: 30px;
    display: flex;
    align-items: center;
  }
  .tb-btn:hover:not(:disabled) { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .tb-btn:disabled { opacity: 0.3; cursor: default; }

  .tb-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }

  #page-display {
    font-size: 0.78rem;
    color: var(--muted);
    min-width: 105px;
    text-align: center;
    white-space: nowrap;
  }

  .zoom-group {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .zoom-group button {
    background: var(--surface);
    border: none;
    color: var(--accent2);
    width: 28px; height: 30px;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.15s;
  }
  .zoom-group button:hover { background: var(--surface2); }
  .zoom-group span { font-size: 0.75rem; color: var(--muted); min-width: 42px; text-align: center; }

  .jump-group {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .jump-group input {
    width: 46px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    padding: 0.2rem 0.3rem;
    font-size: 0.8rem;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    height: 28px;
  }
  .jump-group input:focus { outline: none; border-color: var(--accent); }
  .jump-group button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--accent);
    padding: 0 0.6rem;
    height: 28px;
    cursor: pointer;
    font-size: 0.78rem;
    transition: all 0.15s;
  }
  .jump-group button:hover { background: var(--accent); color: var(--bg); }

  /* ── VIEWER ── */
  #viewer {
    flex: 1;
    overflow: auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 1.2rem;
    min-height: 0;
  }

  #page-container {
    display: flex;
    gap: 0;
    align-items: flex-start;
    flex-shrink: 0;
  }

  .page-side {
    background: white;
    box-shadow: 0 6px 32px rgba(0,0,0,0.65);
    overflow: hidden;
    flex-shrink: 0;
  }
  .page-side canvas { display: block; }

  .spine {
    width: 6px;
    background: linear-gradient(to right, rgba(0,0,0,0.28), rgba(0,0,0,0.03));
    flex-shrink: 0;
    align-self: stretch;
  }

  /* ── STATES ── */
  #loading, #no-file {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.9rem;
    color: var(--muted);
    padding: 4rem 2rem;
    width: 100%;
    text-align: center;
  }
  #no-file { display: none; }
  #no-file h2 { font-size: 1.05rem; color: var(--accent2); font-weight: 400; }
  #no-file code {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.25rem 0.65rem;
    font-size: 0.85rem;
    color: var(--accent);
    font-family: monospace;
  }

  .spinner {
    width: 34px; height: 34px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    top: 1.2rem; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--accent);
    color: var(--bg);
    padding: 0.45rem 1.2rem;
    border-radius: 4px;
    font-size: 0.82rem;
    font-weight: 500;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── FLIP ── */
  .flipping-l { animation: flipL 0.32s ease-in-out; }
  .flipping-r { animation: flipR 0.32s ease-in-out; }
  @keyframes flipL { 0%{transform:rotateY(0)} 40%{transform:rotateY(-82deg)} 100%{transform:rotateY(0)} }
  @keyframes flipR { 0%{transform:rotateY(0)} 40%{transform:rotateY(82deg)}  100%{transform:rotateY(0)} }

  @media (max-width: 540px) {
    .spine { display: none; }
    #page-container { flex-direction: column; }
    .logo span { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Katalogy<span id="katalog-name"></span></div>
</header>

<div class="toolbar">
  <button class="tb-btn" id="btn-prev" disabled onclick="prevSpread()">← Zpět</button>
  <button class="tb-btn" id="btn-next" disabled onclick="nextSpread()">Dál →</button>
  <div class="tb-sep"></div>
  <span id="page-display">— / —</span>
  <div class="tb-sep"></div>
  <div class="zoom-group">
    <button onclick="changeZoom(-0.15)">−</button>
    <span id="zoom-label">100%</span>
    <button onclick="changeZoom(0.15)">+</button>
  </div>
  <button class="tb-btn" onclick="fitToWindow()">⊡ Fit</button>
  <div class="tb-sep"></div>
  <div class="jump-group">
    <span>Str.</span>
    <input type="number" id="jump-input" min="1" placeholder="č.">
    <button onclick="jumpToPage()">Jdi</button>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="sharePage()">⤴ Sdílet</button>
</div>

<div id="toast">Odkaz zkopírován!</div>

<div id="viewer">
  <div id="loading"><div class="spinner"></div><div>Načítám PDF…</div></div>
  <div id="no-file">
    <h2>Žádný katalog nebyl zadán</h2>
    <p>Použij URL ve formátu:</p>
    <code>?file=nazev-katalogu</code>
    <p style="margin-top:0.4rem;font-size:0.82rem">PDF musí být ve složce <code>katalog/</code> v repozitáři</p>
    <p style="margin-top:0.6rem">Přímý odkaz na konkrétní stranu:</p>
    <code>?file=nazev-katalogu&amp;page=15</code>
  </div>
  <div id="page-container" style="display:none">
    <div class="page-side" id="left-page"><canvas id="canvas-left"></canvas></div>
    <div class="spine"></div>
    <div class="page-side" id="right-page"><canvas id="canvas-right"></canvas></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const params    = new URLSearchParams(window.location.search);
const fileName  = params.get('file');
const startPage = parseInt(params.get('page')) || 1;

let pdfDoc = null, currentSpread = 0, scale = 1, totalPages = 0;
let rendering = false, nativePdfW = 0, nativePdfH = 0;

const canvasL   = document.getElementById('canvas-left');
const canvasR   = document.getElementById('canvas-right');
const ctxL      = canvasL.getContext('2d');
const ctxR      = canvasR.getContext('2d');
const leftPage  = document.getElementById('left-page');
const rightPage = document.getElementById('right-page');
const container = document.getElementById('page-container');
const loading   = document.getElementById('loading');
const noFile    = document.getElementById('no-file');
const btnPrev   = document.getElementById('btn-prev');
const btnNext   = document.getElementById('btn-next');
const pageDisp  = document.getElementById('page-display');
const jumpInput = document.getElementById('jump-input');
const zoomLabel = document.getElementById('zoom-label');
const viewer    = document.getElementById('viewer');

if (!fileName) {
  loading.style.display = 'none';
  noFile.style.display  = 'flex';
} else {
  document.getElementById('katalog-name').textContent = ' · ' + decodeURIComponent(fileName);
  document.title = decodeURIComponent(fileName);

  fetch('katalog/' + fileName + '.pdf')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status + ' – soubor katalog/' + fileName + '.pdf nenalezen'); return r.arrayBuffer(); })
    .then(buf => pdfjsLib.getDocument({ data: buf }).promise)
    .then(async pdf => {
      pdfDoc = pdf;
      totalPages = pdf.numPages;
      jumpInput.max = totalPages;

      const p1 = await pdf.getPage(1);
      const vp = p1.getViewport({ scale: 1 });
      nativePdfW = vp.width;
      nativePdfH = vp.height;

      loading.style.display   = 'none';
      container.style.display = 'flex';

      fitToWindow();
      goToPage(startPage);
    })
    .catch(err => {
      loading.innerHTML = `<div style="color:#c0553a;max-width:420px">
        <b>Chyba při načítání:</b><br>${err.message}
        <br><br><small>Zkontroluj, že PDF je uloženo ve složce <b>katalog/</b> v repozitáři.</small>
      </div>`;
    });
}

/* ── Auto-fit ── */
function calcFitScale(spreadCount) {
  if (!nativePdfW) return 1;
  const vw = viewer.clientWidth  - 28;
  const vh = viewer.clientHeight - 28;
  const totalW = nativePdfW * spreadCount + (spreadCount > 1 ? 6 : 0);
  let s = vw / totalW;
  if (nativePdfH * s > vh) s = vh / nativePdfH;
  return Math.max(0.2, s);
}

function fitToWindow() {
  const n = currentSpread === 0 ? 1 : 2;
  scale = calcFitScale(n);
  updateZoomLabel();
  if (pdfDoc) renderSpread(currentSpread, null);
}

function updateZoomLabel() {
  const fit = calcFitScale(currentSpread === 0 ? 1 : 2);
  zoomLabel.textContent = Math.round(scale / fit * 100) + '%';
}

/* ── Spread logic ── */
function spreadForPage(page) {
  if (page <= 1) return 0;
  return Math.ceil((page - 1) / 2);
}
function pagesForSpread(spread) {
  if (spread === 0) return [1, null];
  const l = spread * 2, r = spread * 2 + 1;
  return [l <= totalPages ? l : null, r <= totalPages ? r : null];
}

/* ── Render ── */
async function renderSpread(spread, direction) {
  if (rendering) return;
  rendering = true;
  const [lNum, rNum] = pagesForSpread(spread);

  async function draw(num, canvas, ctx, side) {
    if (!num) { side.style.display = 'none'; return; }
    side.style.display = 'block';
    const page = await pdfDoc.getPage(num);
    const vp   = page.getViewport({ scale });
    canvas.width  = vp.width;
    canvas.height = vp.height;
    await page.render({ canvasContext: ctx, viewport: vp }).promise;
  }

  if (direction) {
    const el  = direction === 'next' ? rightPage : leftPage;
    const cls = direction === 'next' ? 'flipping-r' : 'flipping-l';
    el.classList.add(cls);
    await new Promise(r => setTimeout(r, 160));
    el.classList.remove(cls);
  }

  await Promise.all([draw(lNum, canvasL, ctxL, leftPage), draw(rNum, canvasR, ctxR, rightPage)]);
  currentSpread = spread;

  /* sync URL */
  const shownPage = lNum || rNum;
  const url = new URL(window.location);
  url.searchParams.set('file', fileName);
  url.searchParams.set('page', shownPage);
  window.history.replaceState({}, '', url);

  pageDisp.textContent = rNum
    ? `str. ${lNum}–${rNum} / ${totalPages}`
    : `str. ${lNum} / ${totalPages}`;
  btnPrev.disabled = currentSpread === 0;
  btnNext.disabled = !rNum || rNum >= totalPages;
  updateZoomLabel();
  rendering = false;
}

function goToPage(page) { renderSpread(spreadForPage(page), null); }
function nextSpread() { const n = currentSpread + 1; const [l] = pagesForSpread(n); if (l && l <= totalPages) renderSpread(n, 'next'); }
function prevSpread() { if (currentSpread > 0) renderSpread(currentSpread - 1, 'prev'); }
function jumpToPage() { const n = parseInt(jumpInput.value); if (n >= 1 && n <= totalPages) goToPage(n); jumpInput.value = ''; }

function changeZoom(d) {
  scale = Math.min(Math.max(scale + d, 0.2), 5);
  updateZoomLabel();
  if (pdfDoc) renderSpread(currentSpread, null);
}

function sharePage() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSpread();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevSpread();
});
jumpInput.addEventListener('keydown', e => { if (e.key === 'Enter') jumpToPage(); });

let rTimer;
window.addEventListener('resize', () => { clearTimeout(rTimer); rTimer = setTimeout(fitToWindow, 180); });
</script>
</body>
</html>
